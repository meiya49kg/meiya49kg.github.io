  <h3 style="margin:0 0 8px 0;font-size:20px;color:#333;">✨ 蝦皮推廣券自動轉換器</h3>
  <p style="color:#666;font-size:14px;margin:0 0 16px 0;line-height:1.6;">點連結後自動出現9折券，一人五張</p>
  
  <textarea id="shopee-batch-input" rows="6" style="width:100%;padding:12px;box-sizing:border-box;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;transition:border-color 0.2s;line-height:1.6;" placeholder="每行一個連結。" onfocus="this.style.borderColor='#004aad'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:13px;color:#999;">
    <span id="shopee-count">偵測到 0 個網址</span>
    <span>一次最多 5 個</span>
  </div>
  
  <div style="display:flex;gap:8px;margin-top:12px;">
    <button id="shopee-batch-btn" style="flex:1;padding:14px 28px;background:#004aad;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s;box-shadow:0 2px 6px rgba(0,74,173,0.3);" onmouseover="if(!this.disabled)this.style.background='#003a8a'" onmouseout="if(!this.disabled)this.style.background='#004aad'"><span></span><span>產生連結</span></button>
    <button id="shopee-clear-btn" style="padding:14px 20px;background:#f3f4f6;color:#6b7280;border:1.5px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s;" onmouseover="this.style.background='#e5e7eb';this.style.color='#374151'" onmouseout="this.style.background='#f3f4f6';this.style.color='#6b7280'"><span></span><span>清除</span></button>
  </div>
  
  <div id="shopee-batch-result" style="margin-top:16px;"></div>
  
</div>

<script>
(function(){
  const API_URL = 'https://shopee.meiya-49kg.workers.dev';
  const MAX_LINKS = 5;
  
  const MAIN_BTN_COLOR = '#004aad';
  const ITEM_BTN_COLOR = '#bcdcfa';
  const ITEM_BTN_HOVER = '#9cc7f5';
  const ITEM_BTN_TEXT = '#003a8a';
  
  const btn = document.getElementById('shopee-batch-btn');
  const clearBtn = document.getElementById('shopee-clear-btn');
  const input = document.getElementById('shopee-batch-input');
  const resultDiv = document.getElementById('shopee-batch-result');
  const countSpan = document.getElementById('shopee-count');
  
  function parseUrls(text) {
    if (!text) return [];
    return text.split(/[\s,;\n]+/).map(s => s.trim()).filter(s => s.length > 0 && /shopee\.tw|shp\.ee/.test(s));
  }
  
  function updateCount() {
    const urls = parseUrls(input.value);
    const count = urls.length;
    if (count === 0) {
      countSpan.textContent = '偵測到 0 個網址';
      countSpan.style.color = '#999';
    } else if (count <= MAX_LINKS) {
      countSpan.textContent = `偵測到 ${count} 個蝦皮網址 ✓`;
      countSpan.style.color = '#059669';
    } else {
      countSpan.textContent = `偵測到 ${count} 個,超過上限!只會處理前 ${MAX_LINKS} 個`;
      countSpan.style.color = '#dc2626';
    }
  }
  
  input.addEventListener('input', updateCount);
  
  clearBtn.addEventListener('click', function() {
    input.value = '';
    resultDiv.innerHTML = '';
    updateCount();
    input.focus();
  });
  
  async function convertOne(url, index) {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url }),
      });
      const data = await response.json();
      
      if (data.success && data.redirect_url) {
        return { success: true, url: data.redirect_url, label: `商品${index + 1}`, originalUrl: url };
      } else {
        return { success: false, error: data.message || '轉換失敗', originalUrl: url };
      }
    } catch (e) {
      return { success: false, error: '連線失敗', originalUrl: url };
    }
  }
  
  function renderResults(results) {
    const successResults = results.filter(r => r.success);
    const failResults = results.filter(r => !r.success);
    let html = '';
    
    if (successResults.length > 0) {
      html += '<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;margin-bottom:10px;">';
      html += `<p style="margin:0 0 12px 0;color:#059669;font-weight:bold;">✅ 成功產生 ${successResults.length} 個購買連結</p>`;
      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      successResults.forEach((r) => {
        html += `<a href="${r.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:${ITEM_BTN_COLOR};color:${ITEM_BTN_TEXT};text-decoration:none;border-radius:6px;font-weight:bold;font-size:14px;transition:background 0.2s;box-shadow:0 1px 3px rgba(0,74,173,0.15);" onmouseover="this.style.background='${ITEM_BTN_HOVER}'" onmouseout="this.style.background='${ITEM_BTN_COLOR}'"><span>🛒 ${r.label}</span><span style="font-size:13px;opacity:0.8;">前往購買 →</span></a>`;
      });
      html += '</div></div>';
    }
    
if (failResults.length > 0) {
  html += '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:14px;">';
  html += `<p style="margin:0;color:#dc2626;font-weight:bold;">⚠️ ${failResults.length} 個網址轉換失敗,請檢查網址是否正確</p>`;
  html += '</div>';
}
    
    resultDiv.innerHTML = html;
  }
  
  btn.addEventListener('click', async function() {
    const text = input.value.trim();
    
    if (!text) {
      resultDiv.innerHTML = '<p style="color:#dc2626;margin:0;padding:10px;background:#fef2f2;border-radius:6px;">⚠️ 請先貼上蝦皮網址</p>';
      return;
    }
    
    const urls = parseUrls(text).slice(0, MAX_LINKS);
    
    if (urls.length === 0) {
      resultDiv.innerHTML = '<p style="color:#dc2626;margin:0;padding:10px;background:#fef2f2;border-radius:6px;">⚠️ 沒有偵測到有效的蝦皮網址</p>';
      return;
    }
    
    btn.disabled = true;
    btn.style.background = '#9ca3af';
    btn.style.cursor = 'not-allowed';
    btn.innerHTML = `<span></span><span>處理中... (0/${urls.length})</span>`;
    resultDiv.innerHTML = `<p style="color:#666;margin:0;padding:10px;background:#f9fafb;border-radius:6px;">正在轉換 ${urls.length} 個網址,請稍候...</p>`;
    
    let completed = 0;
    const promises = urls.map((url, i) => 
      convertOne(url, i).then(result => {
        completed++;
        btn.innerHTML = `<span></span><span>處理中... (${completed}/${urls.length})</span>`;
        return result;
      })
    );
    
    const results = await Promise.all(promises);
    
    btn.disabled = false;
    btn.style.background = MAIN_BTN_COLOR;
    btn.style.cursor = 'pointer';
    btn.innerHTML = '<span></span><span>產生連結</span>';
    renderResults(results);
  });
})();
</script>
